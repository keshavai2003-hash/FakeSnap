<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FakeSnap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Fake<span>Snap</span></h1>
                <p>Welcome back! Login to continue</p>
            </div>
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="auth-success">{{ success }}</div>
            {% endif %}
            <form method="POST">
                <div class="auth-input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="auth-input-group password-group">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                    <span class="eye-icon" onclick="togglePassword('password')">👁️</span>
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <div class="auth-links">
                <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                <br><br>
                <a href="{{ url_for('register') }}">Don't have an account? Register</a>
            </div>
        </div>
    </div>
    <script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    </script>
</body>
</html>
