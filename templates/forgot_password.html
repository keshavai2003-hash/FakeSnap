<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FakeSnap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>Fake<span>Snap</span></h1>
                <p>Reset your password</p>
            </div>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            {% if success %}
            <div class="auth-success">{{ success }}</div>
            {% endif %}

            <!-- Step 1 - Enter Username -->
            {% if step == 1 %}
            <form method="POST">
                <input type="hidden" name="step" value="1">
                <div class="auth-input-group">
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                <button type="submit" class="auth-btn">Continue</button>
            </form>

            <!-- Step 2 - Answer Security Question -->
            {% elif step == 2 %}
            <form method="POST">
                <input type="hidden" name="step" value="2">
                <input type="hidden" name="username" value="{{ username }}">
                <div class="auth-question-box">
                    🔐 {{ question }}
                </div>
                <div class="auth-input-group">
                    <input type="text" name="answer" placeholder="Your answer" required>
                </div>
                <button type="submit" class="auth-btn">Verify Answer</button>
            </form>

            <!-- Step 3 - Set New Password -->
            {% elif step == 3 %}
            <form method="POST">
                <input type="hidden" name="step" value="3">
                <input type="hidden" name="username" value="{{ username }}">
                <div class="auth-input-group password-group">
                    <input type="password" name="new_password" id="new_password" placeholder="New Password" required>
                    <span class="eye-icon" onclick="togglePassword('new_password')">👁️</span>
                </div>
                <div class="auth-input-group password-group">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm New Password" required>
                    <span class="eye-icon" onclick="togglePassword('confirm_password')">👁️</span>
                </div>
                <button type="submit" class="auth-btn">Reset Password</button>
            </form>
            {% endif %}

            <div class="auth-links">
                <a href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </div>
    </div>
    <script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    </script>
</body>
</html>
